spring.application.name=core-banking
spring.config.import=optional:file:.env[.properties],optional:file:./backend/.env[.properties]
# ==========================================
# CONNEXION A LA BASE DE DONNEES ORACLE
# ==========================================
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@127.0.0.1:1521/XEPDB1}
spring.datasource.username=${DB_USERNAME:core_banking_user}
spring.datasource.password=${DB_PASSWORD:core_banking_pass}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# ==========================================
# CONFIGURATION HIBERNATE (JPA)
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Affiche le SQL genere dans la console pour verifier que l'UML est bien traduit
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# Desactive l'integration Docker Compose si Docker Desktop n'est pas lance.
spring.docker.compose.enabled=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
application.security.jwt.secret-key=${JWT_SECRET_KEY:VGhpcy1pcy1kZWZhdWx0LWRldi1zZWNyZXQta2V5LWNoYW5nZS1tZS1mb3ItcHJvZA==}
application.security.jwt.expiration=${JWT_EXPIRATION_MS:3600000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
app.security.rate-limit.cache-max-entries=${APP_RATE_LIMIT_CACHE_MAX_ENTRIES:10000}
app.security.rate-limit.cache-ttl=${APP_RATE_LIMIT_CACHE_TTL:30m}
app.security.rate-limit.client-signup.max-requests=${APP_RATE_LIMIT_CLIENT_SIGNUP_MAX_REQUESTS:5}
app.security.rate-limit.client-signup.window=${APP_RATE_LIMIT_CLIENT_SIGNUP_WINDOW:1m}
app.security.rate-limit.user-signup.max-requests=${APP_RATE_LIMIT_USER_SIGNUP_MAX_REQUESTS:3}
app.security.rate-limit.user-signup.window=${APP_RATE_LIMIT_USER_SIGNUP_WINDOW:1m}
app.security.rate-limit.login.max-requests=${APP_RATE_LIMIT_LOGIN_MAX_REQUESTS:10}
app.security.rate-limit.login.window=${APP_RATE_LIMIT_LOGIN_WINDOW:1m}
app.security.auth.max-failed-attempts=${APP_AUTH_MAX_FAILED_ATTEMPTS:5}
app.security.auth.lock-duration=${APP_AUTH_LOCK_DURATION:15m}
app.security.auth.credentials-validity-days=${APP_AUTH_CREDENTIALS_VALIDITY_DAYS:90}
app.security.auth.otp-validity=${APP_AUTH_OTP_VALIDITY:5m}
app.security.auth.otp-length=${APP_AUTH_OTP_LENGTH:6}
app.security.auth.max-otp-attempts=${APP_AUTH_MAX_OTP_ATTEMPTS:3}
app.workflow.transaction.approval-threshold=${APP_TRANSACTION_APPROVAL_THRESHOLD:500000.00}
