spring.application.name=core-banking

# ===============================
# CONFIGURATION BASE DE DONNEES H2
# ===============================
spring.datasource.url=jdbc:h2:mem:microfinancedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================
# CONFIGURATION HIBERNATE / JPA
# ===============================
# Dit a Hibernate de recreer les tables a chaque demarrage (ideal pour le developpement)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Affiche le SQL genere dans la console pour verifier que l'UML est bien traduit
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desactive l'integration Docker Compose si Docker Desktop n'est pas lance.
spring.docker.compose.enabled=false

# ===============================
# CONSOLE H2 (Interface Web)
# ===============================
# Permet d'acceder a la base de donnees via le navigateur
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console