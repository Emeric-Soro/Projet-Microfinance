spring.application.name=core-banking
# ===============================
# CONFIGURATION BASE DE DONN…ES H2
# ===============================
spring.datasource.url=jdbc:h2:mem:microfinancedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================
# CONFIGURATION HIBERNATE / JPA
# ===============================
# Dit ŗ Hibernate de recrťer les tables ŗ chaque dťmarrage (idťal pour le dťveloppement)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Affiche le SQL gťnťrť dans la console pour vťrifier que l'UML est bien traduit
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CONSOLE H2 (Interface Web)
# ===============================
# Permet d'accťder ŗ la base de donnťes via le navigateur
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console