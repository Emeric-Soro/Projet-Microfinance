framework:
    secret: '%env(APP_SECRET)%'
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native
    assets:
        enabled: true
    translator:
        fallbacks: ['fr']
    http_client:
        enabled: true
        scoped_clients:
            api.client:
                base_uri: '%env(API_BASE_URL)%'
                timeout: 30
                headers:
                    Accept: 'application/json'
                    Content-Type: 'application/json'
