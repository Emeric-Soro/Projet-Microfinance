security:
    password_hashers:
        App\Entity\User: 'auto'

    providers:
        app_user_provider:
            id: App\Security\UserProvider

    firewalls:
        main:
            pattern: ^/
            provider: app_user_provider
            stateless: false
            custom_authenticators:
                - App\Security\SessionAuthenticator
            logout:
                path: /logout
                target: /login
            access_denied_handler: App\Security\AccessDeniedHandler
            two_factor:
                auth_form_path: /2fa
                check_path: /2fa_check
                enable_csrf: true

    access_control:
        - { path: ^/_wdt, roles: PUBLIC_ACCESS }
        - { path: ^/_profiler, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/login/otp, roles: PUBLIC_ACCESS }
        - { path: ^/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/account-locked, roles: PUBLIC_ACCESS }
        - { path: ^/2fa, roles: IS_AUTHENTICATED_2FA_IN_PROGRESS }
        - { path: ^/setup-2fa, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/select-agency, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/change-expired-password, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/dashboard/direction, roles: ROLE_ADMIN }
        - { path: ^/dashboard, roles: ROLE_USER }
        - { path: ^/clients, roles: ROLE_USER }
        - { path: ^/comptes, roles: ROLE_USER }
        - { path: ^/operations, roles: ROLE_USER }
        - { path: ^/validations, roles: ROLE_SUPERVISEUR }
        - { path: ^/, roles: IS_AUTHENTICATED_FULLY }

    role_hierarchy:
        ROLE_ADMIN: [ROLE_SUPERVISEUR, ROLE_MANAGER, ROLE_CHEF_AGENCE]
        ROLE_SUPERVISEUR: [ROLE_GUICHETIER, ROLE_AGENT]
        ROLE_MANAGER: [ROLE_SUPERVISEUR]
        ROLE_CHEF_AGENCE: [ROLE_SUPERVISEUR]
        ROLE_GUICHETIER: [ROLE_USER]
        ROLE_AGENT: [ROLE_USER]
