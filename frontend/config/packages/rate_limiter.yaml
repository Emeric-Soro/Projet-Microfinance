framework:
    rate_limiter:
        login:
            policy: 'sliding_window'
            limit: 5
            interval: '1 minute'
        otp:
            policy: 'sliding_window'
            limit: 3
            interval: '5 minutes'
        api:
            policy: 'token_bucket'
            limit: 100
            rate: { interval: '1 minute', amount: 10 }
